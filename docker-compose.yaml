version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: luminal_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: luminal
      POSTGRES_PASSWORD: luminal
      POSTGRES_DB: luminal_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: luminal_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: luminal_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: luminal_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: luminal_backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_URL=postgresql://luminal:luminal@postgres:5432/luminal_db
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      - postgres
      - neo4j
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data: